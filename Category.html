<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0d1117; color: #fff; font-family: sans-serif; margin: 0; padding: 5px; box-sizing: border-box; }
        
        /* গ্রিড লেআউট ফিক্সড করা হয়েছে যাতে দুই পাশের কার্ড সবসময় সমান থাকে */
        .category-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* দুই কলাম সমান জায়গা নেবে */
            gap: 10px; 
            width: 100%; 
        }
        
        .cat-card { 
            background: #161b22; 
            border: 2px solid #10b981; 
            border-radius: 15px; 
            padding: 12px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            width: 100%; 
            box-sizing: border-box; 
            height: 65px; /* হাইট ফিক্সড করে দেওয়া হয়েছে যাতে সব কার্ড সমান দেখায় */
        }

        .cat-icon { 
            width: 40px; height: 40px; border-radius: 50%; background: #fff; margin-right: 12px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
        }
        .cat-icon img { width: 100%; height: 100%; object-fit: cover; }
        .cat-name { font-size: 16px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


.cat-card { 
    background: #161b22; 
    /* বর্ডারটি স্বচ্ছ রাখা হয়েছে যাতে ব্যাকগ্রাউন্ডের ওপর এনিমেশন দেখা যায় */
    border: 0.5px solid transparent; 
    border-radius: 15px; 
    padding: 12px; 
    display: flex; 
    align-items: center; 
    cursor: pointer; 
    width: 100%; 
    box-sizing: border-box; 
    height: 65px;
    
    /* RGB এনিমেশন সেটআপ */
    background-image: linear-gradient(#161b22, #161b22), linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
    background-origin: border-box;
    background-clip: padding-box, border-box;
    background-size: 200% 100%;
    animation: rgb-border 10s linear infinite;
}

/* এনিমেশন ফ্রেম */
@keyframes rgb-border {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
}





    </style>
</head>

    <script>
        function filterMatches(query) {
            let cards = document.querySelectorAll('.cat-card');
            query = query.toLowerCase().trim();
            cards.forEach(card => {
                let text = card.innerText.toLowerCase();
                card.style.display = (query === "" || text.includes(query)) ? "flex" : "none";
            });
        }
        function sendData(url) {
            if (window.AppInventor) window.AppInventor.setWebViewString(url);
            else if (window.CustomWebView) window.CustomWebView.setWebViewString(url);
            else window.WebViewString = url;
        }
